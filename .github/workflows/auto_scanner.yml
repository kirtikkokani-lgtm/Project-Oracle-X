run: |
          python -c "
          import yfinance as yf
          import requests
          import os

          stocks = ['RELIANCE.NS', 'TCS.NS', 'TATAMOTORS.NS', 'SBIN.NS']
          token = os.getenv('TOKEN')
          chat_id = os.getenv('CHAT_ID')

          for s in stocks:
              try:
                  data = yf.download(s, period='5d', interval='1h', progress=False)
                  # .iloc[-1] वापरून फक्त शेवटची किंमत नंबर (float) म्हणून घ्या
                  price = float(data['Close'].iloc[-1])
                  
                  msg = f'🤖 Oracle Update: {s} सध्या ₹{price:.2f} वर आहे.'
                  requests.get(f'https://api.telegram.org/bot{token}/sendMessage?chat_id={chat_id}&text={msg}')
              except Exception as e:
                  print(f'Error for {s}: {e}')
          "
