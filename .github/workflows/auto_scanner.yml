name: Oracle-X Pro Scanner
on:
  schedule:
    # सोमवार ते शुक्रवार: सकाळी १०:००, दुपारी १२:०० आणि दुपारी २:०० वाजता (IST)
    - cron: '30 4,6,8 * * 1-5'
  workflow_dispatch: 

jobs:
  trading_bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install yfinance pandas requests

      - name: Run Market Analysis
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python -c "
          import yfinance as yf
          import pandas as pd
          import requests
          import os

          def get_rsi(series, window=14):
              delta = series.diff()
              gain = (delta.where(delta > 0, 0)).rolling(window=window).mean()
              loss = (-delta.where(delta < 0, 0)).rolling(window=window).mean()
              rs = gain / loss
              return 100 - (100 / (1 + rs))

          stocks = ['RELIANCE.NS', 'TCS.NS', 'TATAMOTORS.NS', 'SBIN.NS', 'INFY.NS', 'HDFCBANK.NS']
          token = os.getenv('TOKEN')
          chat_id = os.getenv('CHAT_ID')
          
          final_msg = '🔮 *Oracle-X Smart Analysis* 🔮\n\n'
          opportunities = []

          for s in stocks:
              try:
                  # १ तासाचा डेटा विश्लेषण करण्यासाठी
                  df = yf.download(s, period='5d', interval='1h', progress=False)
                  if not df.empty:
                      price = float(df['Close'].iloc[-1])
                      rsi = float(get_rsi(df['Close']).iloc[-1])
                      
                      # सिग्नल ठरवणे
                      status = 'Neutral ⚪'
                      if rsi < 35: 
                          status = 'BUY 🚀 (Oversold)'
                          opportunities.append(f'✅ *{s}* looks cheap at ₹{price:.2f}')
                      elif rsi > 70: 
                          status = 'SELL 🔥 (Overbought)'
                          opportunities.append(f'⚠️ *{s}* is overbought at ₹{price:.2f}')
                      
                      final_msg += f'*{s}*: ₹{price:.2f} | RSI: {rsi:.1f} | {status}\n'
              except:
                  continue

          if opportunities:
              final_msg += '\n💡 *Top Opportunities:* \n' + '\n'.join(opportunities)

          url = f'https://api.telegram.org/bot{token}/sendMessage'
          requests.post(url, data={'chat_id': chat_id, 'text': final_msg, 'parse_mode': 'Markdown'})
          "
